{% load static %}
<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Resource Partner AI{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2317211d'/%3E%3Ctext x='32' y='42' text-anchor='middle' font-size='34' font-family='Arial' font-weight='700' fill='white'%3ER%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="{% static 'portal/styles.css' %}">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="{% url 'portal:index' %}">
            <span class="brand-mark">R</span>
            <span>
                <strong>Resource Partner AI</strong>
                <small>B2B портал застройщика</small>
            </span>
        </a>
        <nav class="nav">
            <a href="{% url 'portal:agent' %}">Агент</a>
            <a href="{% url 'portal:manager' %}">Менеджер</a>
            <a href="{% url 'portal:rop' %}">РОП</a>
            <a href="{% url 'portal:ai' %}">AI-помощник</a>
            <a href="{% url 'portal:tools' %}">Инструменты</a>
        </nav>
    </header>

    <main class="page">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
